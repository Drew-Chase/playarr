info:
  name: Clear stored Plex auth token
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/logout"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Logout successful
    request:
      url: "{{baseUrl}}/auth/logout"
      method: POST
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": true
          }
