info:
  name: Create a Watch Together room
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/watch-party/rooms"
  body:
    type: json
    data: |-
      {
        "name": "",
        "accessMode": "public",
        "allowedUserIds": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Room created successfully
    request:
      url: "{{baseUrl}}/watch-party/rooms"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "Movie Night",
            "accessMode": "public",
            "allowedUserIds": []
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 401 Response
    description: Not signed in
    request:
      url: "{{baseUrl}}/watch-party/rooms"
      method: POST
    response:
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Not signed in",
            "status": 401
          }
