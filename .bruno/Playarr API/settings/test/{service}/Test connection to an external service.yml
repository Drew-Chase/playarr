info:
  name: Test connection to an external service
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/settings/test/:service"
  params:
    - name: service
      value: ""
      type: path
      description: "Service to test (plex, sonarr, radarr, opensubtitles, download-client)"
  body:
    type: json
    data: |-
      {
        "url": "",
        "token": "",
        "api_key": "",
        "type": "",
        "username": "",
        "password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Connection test result
    request:
      url: "{{baseUrl}}/settings/test/:service"
      method: POST
      params:
        - name: service
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "url": "",
            "api_key": ""
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Connection successful"
          }
  - name: 400 Response
    description: Service not configured or unknown service
    request:
      url: "{{baseUrl}}/settings/test/:service"
      method: POST
      params:
        - name: service
          value: ""
          type: path
    response:
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": ""
          }
