info:
  name: Get or transcode an image by Plex path
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/media/image"
  params:
    - name: path
      value: ""
      type: query
    - name: width
      value: ""
      type: query
    - name: height
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
