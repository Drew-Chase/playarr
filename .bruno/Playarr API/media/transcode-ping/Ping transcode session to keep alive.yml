info:
  name: Ping transcode session to keep alive
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/media/transcode-ping/:session_id"
  params:
    - name: session_id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
