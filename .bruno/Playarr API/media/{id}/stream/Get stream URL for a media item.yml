info:
  name: Get stream URL for a media item
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/media/:id/stream"
  params:
    - name: id
      value: ""
      type: path
      description: Plex rating key (media ID)
    - name: quality
      value: ""
      type: query
      description: "Transcode quality preset (4k, 1080p, 720p, 480p, original)"
    - name: direct_play
      value: ""
      type: query
      description: "Use direct play (true) or HLS transcode (false). Default: true."
    - name: direct_stream
      value: ""
      type: query
      description: "Use DirectStream mode — video untouched, audio transcoded. Default: false."
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Stream URL and media info
    request:
      url: "{{baseUrl}}/media/:id/stream"
      method: GET
      params:
        - name: id
          value: ""
          type: path
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "url": "",
            "type": "",
            "session": "",
            "media": {},
            "part": {}
          }
  - name: 500 Response
    description: Internal server error
    request:
      url: "{{baseUrl}}/media/:id/stream"
      method: GET
      params:
        - name: id
          value: ""
          type: path
    response:
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "",
            "status": 0
          }
